<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Release Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- jsPDF and html2canvas for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #a4-container {
            max-width: 210mm; 
            margin-left: auto;
            margin-right: auto;
            background: white; /* Ensure white background for slicing */
        }
        .tab-button.active {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
            font-weight: 600;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        /* Dynamic Section Styling */
        .section-block {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div id="app-container" class="max-w-5xl mx-auto p-4 md:p-8">
        <div class="mb-6 border-b border-gray-200">
            <nav class="flex -mb-px space-x-6">
                <button id="generator-tab-button" onclick="handleGeneratorTabClick()" class="tab-button py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors duration-200 ease-in-out active">
                    Generator
                </button>
                <button id="history-tab-button" onclick="switchView('history-view')" class="tab-button py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors duration-200 ease-in-out">
                    History
                </button>
            </nav>
        </div>

        <!-- FORM VIEW -->
        <div id="form-view">
            <div class="bg-white p-8 rounded-xl shadow-lg">
                <input type="hidden" id="editing-id">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 id="form-title" class="text-3xl font-bold text-gray-900">Technical Release Generator</h1>
                        <p class="text-gray-600">Structure your document using the block manager below.</p>
                    </div>
                    <div class="text-right">
                        <label for="ref-number-input" class="block text-sm font-medium text-gray-700 text-right">Reference Number</label>
                        <input type="text" id="ref-number-input" class="w-48 mt-1 px-3 py-2 border border-gray-300 rounded-lg text-right font-bold text-blue-600 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="Loading...">
                    </div>
                </div>

                <!-- Global Header Data -->
                <div class="space-y-6 mb-8 pb-8 border-b border-gray-200">
                    <h3 class="text-lg font-bold text-gray-800">Document Header Info</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="productsAffected" class="block text-sm font-medium text-gray-700 mb-1">Products Affected</label>
                            <input type="text" id="productsAffected" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="e.g., Alpha Motors">
                        </div>
                        <div>
                            <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Release Category</label>
                            <select id="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                                <option>Motors</option> <option>Fabrics</option> <option>Hardware</option> <option>Software</option> <option>Installation Procedure</option> <option>Other</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                            <input type="text" id="title" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="e.g., Somfy Zigbee Motors">
                        </div>
                        <div>
                            <label for="effectiveDate" class="block text-sm font-medium text-gray-700 mb-1">Effective Date</label>
                            <input type="date" id="effectiveDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        </div>
                    </div>
                </div>

                <!-- Dynamic Sections Container -->
                <div class="mb-4 flex items-center justify-between">
                    <h3 class="text-lg font-bold text-gray-800">Page Content Blocks</h3>
                    <div class="flex gap-2">
                        <button onclick="addSection('text')" class="px-3 py-1.5 bg-indigo-100 text-indigo-700 font-semibold rounded hover:bg-indigo-200 transition text-sm flex items-center gap-1">+ Text Block</button>
                        <button onclick="addSection('images')" class="px-3 py-1.5 bg-emerald-100 text-emerald-700 font-semibold rounded hover:bg-emerald-200 transition text-sm flex items-center gap-1">+ Image Gallery</button>
                    </div>
                </div>

                <div id="dynamic-sections-container" class="space-y-6">
                    <!-- Sections generated via JS -->
                </div>

                <div class="mt-10">
                    <button id="generate-button" onclick="generateDocument()" class="w-full bg-blue-600 text-white font-bold py-4 px-6 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition-all duration-300 transform hover:scale-[1.01] shadow-md">
                        Preview Document
                    </button>
                </div>
            </div>
        </div>

        <!-- HISTORY VIEW -->
        <div id="history-view" class="hidden">
            <div class="bg-white p-8 rounded-xl shadow-lg">
                <h1 class="text-3xl font-bold text-gray-900 mb-6">Release History</h1>
                <div class="mb-6">
                    <input type="text" id="search-input" onkeyup="searchReleases()" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="Search by title, ref no, product, or any keyword...">
                </div>
                <div id="history-results" class="space-y-4">
                    <p class="text-gray-500">Loading history...</p>
                </div>
            </div>
        </div>

        <!-- DOCUMENT OUTPUT VIEW -->
        <div id="document-view" class="hidden">
             <div class="flex justify-end gap-2 mb-4">
                <button onclick="startNewRelease()" class="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 transition">Start New Release</button>
                <button onclick="switchView('form-view')" class="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 transition">Back to Editor</button>
                <button id="pdf-download-button" onclick="downloadPDF()" class="bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                    <span id="pdf-download-text">Download Multi-Page PDF</span>
                    <span id="pdf-download-spinner" class="spinner hidden"></span>
                </button>
                <button id="firebase-save-button" onclick="saveToFirebase()" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <span id="firebase-save-text">Save to Firebase</span>
                    <span id="firebase-spinner" class="spinner hidden"></span>
                </button>
            </div>
            <div id="a4-container">
                <div id="document-output" class="bg-white p-8 md:p-12 rounded-xl shadow-lg border border-gray-200">
                     <header class="border-b pb-6 mb-8">
                        <h1 class="text-xl font-bold text-gray-800">Blind Designs Technical Release</h1>
                        <h2 id="output-title" class="text-3xl md:text-4xl font-bold text-gray-900 mt-4 break-words"></h2>
                        <div class="mt-6 grid grid-cols-3 gap-4 text-sm">
                            <div class="bg-gray-50 p-3 rounded-lg"><p class="font-semibold text-gray-600">Reference No.</p><p id="output-ref" class="text-gray-900 font-medium"></p></div>
                            <div class="bg-gray-50 p-3 rounded-lg"><p class="font-semibold text-gray-600">Release Date</p><p id="output-releaseDate" class="text-gray-900 font-medium"></p></div>
                            <div class="bg-gray-50 p-3 rounded-lg"><p class="font-semibold text-gray-600">Effective Date</p><p id="output-effectiveDate" class="text-gray-900 font-medium"></p></div>
                            <div class="bg-gray-50 p-3 rounded-lg"><p class="font-semibold text-gray-600">Category</p><p id="output-category" class="text-gray-900 font-medium"></p></div>
                            <div class="bg-gray-50 p-3 rounded-lg col-span-2"><p class="font-semibold text-gray-600">Products Affected</p><p id="output-products" class="text-gray-900 font-medium break-words"></p></div>
                        </div>
                    </header>
                    
                    <!-- Dynamic Sections Output -->
                    <main id="output-sections-container" class="space-y-8">
                        <!-- Filled via JS -->
                    </main>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, serverTimestamp, query, orderBy, runTransaction, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCAnOF4XM_sYW1-s4iEM7i3JmiB7zFCSkw", 
          authDomain: "tech-release-generator.firebaseapp.com",
          projectId: "tech-release-generator",
          storageBucket: "tech-release-generator.firebasestorage.app",
          messagingSenderId: "436027193031",
          appId: "1:436027193031:web:b4235e2f0e8ce025c730e2",
          measurementId: "G-2D5WVYH83J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app); 

        window.firebase = { db, storage, auth, collection, addDoc, getDocs, ref, uploadBytes, getDownloadURL, doc, updateDoc, serverTimestamp, query, orderBy, runTransaction, getDoc, setDoc, deleteDoc, deleteObject };
        
        signInAnonymously(auth).then(() => {
            console.log("Logged in to Firebase securely.");
            window.dispatchEvent(new CustomEvent('firebaseReady'));
        }).catch((error) => {
            console.error("Firebase Auth Error:", error);
            if (error.code === 'auth/configuration-not-found' || error.code === 'auth/operation-not-allowed') {
                 alert("Firebase Authentication is not enabled for this project.\n\nPlease go to your Firebase Console -> Build -> Authentication -> Get Started.\nThen go to 'Sign-in method' and enable the 'Anonymous' provider so you can save PDFs to Storage.");
            }
            window.dispatchEvent(new CustomEvent('firebaseReady'));
        });
    </script>
    
    <script>
        // Use the exact same proxy URL as OrderBot
        const PROXY_API_URL = 'https://gemini-secure-proxy-51064902388.africa-south1.run.app';

        let allReleases = []; 
        let suggestedRefNumber = '';
        
        // Dynamic Blocks State
        let documentSections = [];

        function generateId() {
            return 'sec_' + Math.random().toString(36).substr(2, 9);
        }

        // Initialize default layout
        function initDefaultSections() {
            documentSections = [
                { id: generateId(), type: 'text', title: 'Overview', content: '' },
                { id: generateId(), type: 'text', title: 'Details', content: '' },
                { id: generateId(), type: 'images', title: 'Images', images: [] },
                { id: generateId(), type: 'text', title: 'Impact and Action Required', content: '' }
            ];
            renderSectionsForm();
        }

        // Ensure the UI renders immediately. 
        // Since this script is at the bottom of the body, the DOM is already parsed and ready.
        if (documentSections.length === 0) {
            initDefaultSections();
        }

        // CORRECTED: Attach the listener to the 'window' object, exactly where the event is dispatched
        window.addEventListener('firebaseReady', async () => {
             try {
                await window.loadHistory();
                await window.updateRefDisplay();
            } catch (e) {
                console.error("Initial app load failed.", e);
            }
        });

        async function getNextRefNumber() {
            const counterRef = window.firebase.doc(window.firebase.db, "_config", "releaseCounter");
            try {
                const counterSnap = await window.firebase.getDoc(counterRef);
                let currentCounter = 1;
                if (counterSnap.exists()) {
                    currentCounter = counterSnap.data().value;
                } else {
                    await window.firebase.setDoc(counterRef, { value: 1 });
                }
                const year = new Date().getFullYear();
                return `TR-${year}-${currentCounter.toString().padStart(3, '0')}`;
            } catch (error) {
                console.error("Could not fetch the next reference number:", error);
                return "TR-ERROR-1";
            }
        }
        
        window.updateRefDisplay = async function() {
             suggestedRefNumber = await getNextRefNumber();
             document.getElementById('ref-number-input').value = suggestedRefNumber;
        }

        // --- DYNAMIC SECTION UI MANAGER ---
        
        function addSection(type) {
            documentSections.push({
                id: generateId(),
                type: type,
                title: type === 'text' ? 'New Text Section' : 'New Image Gallery',
                content: '',
                images: []
            });
            renderSectionsForm();
        }

        function moveSection(index, direction) {
            if (direction === 'up' && index > 0) {
                [documentSections[index - 1], documentSections[index]] = [documentSections[index], documentSections[index - 1]];
            } else if (direction === 'down' && index < documentSections.length - 1) {
                [documentSections[index], documentSections[index + 1]] = [documentSections[index + 1], documentSections[index]];
            }
            renderSectionsForm();
        }

        function deleteSection(index) {
            if(confirm("Delete this section block?")) {
                documentSections.splice(index, 1);
                renderSectionsForm();
            }
        }

        function renderSectionsForm() {
            const container = document.getElementById('dynamic-sections-container');
            container.innerHTML = '';

            documentSections.forEach((section, index) => {
                const block = document.createElement('div');
                block.className = 'section-block bg-white border border-gray-200 rounded-lg p-5 shadow-sm relative group';
                
                // Block Controls
                const controls = `
                    <div class="absolute right-4 top-4 flex items-center gap-1 opacity-50 group-hover:opacity-100 transition-opacity">
                        <button onclick="moveSection(${index}, 'up')" class="p-1 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded" title="Move Up">↑</button>
                        <button onclick="moveSection(${index}, 'down')" class="p-1 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded" title="Move Down">↓</button>
                        <button onclick="deleteSection(${index})" class="p-1 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded ml-2" title="Delete">✕</button>
                    </div>
                `;

                // Title Input
                const titleInput = `
                    <div class="mb-4 pr-24">
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Section Title</label>
                        <input type="text" value="${section.title}" oninput="documentSections[${index}].title = this.value" class="w-full text-lg font-bold px-0 py-1 border-0 border-b border-dashed border-gray-300 focus:ring-0 focus:border-blue-500 transition bg-transparent">
                    </div>
                `;

                let bodyHtml = '';

                if (section.type === 'text') {
                    bodyHtml = `
                        <div>
                            <textarea id="textarea-${section.id}" rows="4" oninput="documentSections[${index}].content = this.value" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="Enter content for this section...">${section.content || ''}</textarea>
                            <button onclick="refineSectionText('${section.id}', ${index})" class="mt-2 px-3 py-1.5 text-xs font-semibold text-blue-600 bg-blue-100 rounded-md hover:bg-blue-200 transition flex items-center gap-2 w-max">
                                <span class="refine-text">Refine Section with AI</span> <span class="spinner hidden"></span>
                            </button>
                        </div>
                    `;
                } else if (section.type === 'images') {
                    // Image Grid HTML
                    const imgGridHtml = section.images.map((imgObj, imgIndex) => `
                        <div class="relative group border rounded-lg p-2 bg-gray-50">
                            <img src="${imgObj.src}" class="w-full h-24 object-cover rounded shadow-sm border mb-2">
                            <input type="text" value="${imgObj.heading || ''}" oninput="documentSections[${index}].images[${imgIndex}].heading = this.value" class="w-full px-2 py-1 border border-gray-300 rounded-md text-xs" placeholder="Image heading...">
                            <button onclick="removeImageFromSection(${index}, ${imgIndex})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity shadow">✕</button>
                        </div>
                    `).join('');

                    bodyHtml = `
                        <div>
                            <div id="drop-zone-${section.id}" class="drop-zone flex justify-center items-center w-full p-6 rounded-lg cursor-pointer bg-gray-50 hover:bg-blue-50 transition" onclick="document.getElementById('file-${section.id}').click()">
                                <div class="text-center">
                                    <p class="text-sm text-gray-600"><span class="font-semibold">Click to add images</span> or drag and drop</p>
                                </div>
                                <input type="file" id="file-${section.id}" multiple accept="image/*" class="hidden" onchange="handleSectionFiles(this.files, ${index})">
                            </div>
                            <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="img-grid-${section.id}">
                                ${imgGridHtml}
                            </div>
                            ${section.images.length > 0 ? `
                            <button onclick="generateHeadingsForSection(${index})" class="mt-4 px-3 py-1.5 text-xs font-semibold text-emerald-700 bg-emerald-100 rounded-md hover:bg-emerald-200 transition flex items-center gap-2 w-max">
                                <span class="refine-text">Generate Headings with AI</span> <span class="spinner hidden"></span>
                            </button>
                            ` : ''}
                        </div>
                    `;
                }

                block.innerHTML = controls + titleInput + bodyHtml;
                container.appendChild(block);
                
                // Drag drop listeners for specific section
                if (section.type === 'images') {
                    const dz = document.getElementById(`drop-zone-${section.id}`);
                    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
                    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
                    dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('dragover'); handleSectionFiles(e.dataTransfer.files, index); });
                }
            });
        }

        // --- IMAGE HANDLING PER SECTION ---
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function handleSectionFiles(files, sectionIndex) {
            if (!files || files.length === 0) return;
            const section = documentSections[sectionIndex];
            
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                toBase64(file).then(base64_src => {
                    section.images.push({ src: base64_src, heading: '', mimeType: file.type });
                    renderSectionsForm(); // Re-render to show new images
                });
            });
        }

        function removeImageFromSection(sectionIndex, imgIndex) {
            documentSections[sectionIndex].images.splice(imgIndex, 1);
            renderSectionsForm();
        }

        // --- AI API PROXY INTEGRATION ---
        async function callGemini(prompt, model, responseSchema = null) {
            const geminiPayload = { 
                contents: [{ role: "user", parts: Array.isArray(prompt) ? prompt : [{ text: prompt }] }] 
            };
            if (responseSchema) {
                geminiPayload.generationConfig = { responseMimeType: "application/json", responseSchema: responseSchema };
            }
            const proxyPayload = { model: model, payload: geminiPayload };
            const response = await fetch(PROXY_API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(proxyPayload) 
            });

            if (!response.ok) {
                let msg = `Request failed: ${response.status}`;
                try { const data = await response.json(); if (data.error) msg = data.error.message; } catch (e) {}
                throw new Error(msg);
            }
            const result = await response.json();
            return result.candidates[0].content.parts[0].text;
        }

        async function refineSectionText(sectionId, index) {
            const textarea = document.getElementById(`textarea-${sectionId}`);
            const button = textarea.nextElementSibling;
            const spinner = button.querySelector('.spinner');
            const buttonText = button.querySelector('.refine-text');
            const originalText = documentSections[index].content;
            
            if (!originalText.trim()) { alert("Please enter some text to refine."); return; }
            
            spinner.classList.remove('hidden');
            buttonText.textContent = 'Refining...';
            button.disabled = true;
            try {
                const prompt = `Rewrite and improve the following text for a professional technical release document. Enhance its clarity, grammar, and formal tone. Respond with only the improved text. Original text: "${originalText}"`;
                const refinedText = await callGemini(prompt, 'gemini-3-flash-preview');
                documentSections[index].content = refinedText.trim();
                renderSectionsForm(); // Refresh UI
            } catch (error) {
                alert(`Error refining text: ${error.message}`);
            } finally {
                if(document.getElementById(`textarea-${sectionId}`)) { // Check if still exists
                    spinner.classList.add('hidden');
                    buttonText.textContent = 'Refine Section with AI';
                    button.disabled = false;
                }
            }
        }
        
        async function generateHeadingsForSection(index) {
            const section = documentSections[index];
            if (section.images.length === 0) return;
            
            // Gather context from all text sections
            let context = `Title: ${document.getElementById('title').value}\n`;
            documentSections.filter(s => s.type === 'text').forEach(s => {
                context += `${s.title}: ${s.content}\n`;
            });

            const promptParts = [{ text: `Based on the following document context, generate a short, descriptive heading for each image. Context: ${context}\n\n` }];
            section.images.forEach(img => {
                promptParts.push({ inlineData: { mimeType: img.mimeType || 'image/jpeg', data: img.src.split(',')[1] } });
                promptParts.push({ text: "\n" });
            });

            // Re-render immediately to show loading state (complex in pure JS, let's just use alert/fallback if needed, or simple UI overlay)
            const block = document.querySelectorAll('.section-block')[index];
            const btn = block.querySelector('button.bg-emerald-100');
            const spinner = btn.querySelector('.spinner');
            const btnText = btn.querySelector('.refine-text');
            
            spinner.classList.remove('hidden');
            btnText.textContent = 'Generating...';
            btn.disabled = true;

            try {
                const schema = { type: "OBJECT", properties: { headings: { type: "ARRAY", items: { "type": "STRING" } } } };
                const resultText = await callGemini(promptParts, 'gemini-3-flash-preview', schema);
                const resultJson = JSON.parse(resultText);
                
                if (resultJson.headings && resultJson.headings.length === section.images.length) {
                    resultJson.headings.forEach((heading, i) => {
                        section.images[i].heading = heading;
                    });
                    renderSectionsForm();
                } else { throw new Error("Incorrect number of headings received."); }
            } catch (error) {
                alert(`Error generating image headings: ${error.message}`);
                spinner.classList.add('hidden');
                btnText.textContent = 'Generate Headings with AI';
                btn.disabled = false;
            }
        }

        // --- PREVIEW DOCUMENT ---
        function generateDocument() {
            const refNumber = document.getElementById('ref-number-input').value;
            document.getElementById('output-ref').textContent = refNumber;
            document.getElementById('output-products').textContent = document.getElementById('productsAffected').value;
            document.getElementById('output-category').textContent = document.getElementById('category').value;
            document.getElementById('output-title').textContent = document.getElementById('title').value || 'Untitled Release';
            
            const releaseDate = new Date().toLocaleDateString('en-CA');
            const effectiveDateRaw = document.getElementById('effectiveDate').value;
            const effectiveDate = effectiveDateRaw ? new Date(effectiveDateRaw + 'T00:00:00').toLocaleDateString('en-CA') : 'TBD';
            document.getElementById('output-releaseDate').textContent = releaseDate;
            document.getElementById('output-effectiveDate').textContent = effectiveDate;

            // Render Dynamic Sections
            const outContainer = document.getElementById('output-sections-container');
            outContainer.innerHTML = '';

            documentSections.forEach(section => {
                const secDiv = document.createElement('div');
                secDiv.className = "mb-8";
                
                const titleHtml = `<h3 class="text-xl font-bold mb-3 text-gray-800 border-b-2 border-blue-200 pb-2">${section.title}</h3>`;
                
                if (section.type === 'text') {
                    secDiv.innerHTML = `${titleHtml}<p class="text-gray-700 leading-relaxed whitespace-pre-wrap break-words">${section.content}</p>`;
                    // Add yellow alert styling if it's an impact section (legacy support styling)
                    if (section.title.toLowerCase().includes('impact')) {
                        secDiv.innerHTML = `
                            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg">
                                <div class="flex">
                                    <div class="flex-shrink-0"><svg class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.21 3.03-1.742 3.03H4.42c-1.532 0-2.492-1.696-1.742-3.03l5.58-9.92zM10 13a1 1 0 110-2 1 1 0 010 2zm-1-8a1 1 0 011-1h.01a1 1 0 110 2H10a1 1 0 01-1-1z" clip-rule="evenodd" /></svg></div>
                                    <div class="ml-3"><h3 class="text-lg font-bold text-yellow-800">${section.title}</h3><div class="mt-2 text-sm text-yellow-700"><p class="whitespace-pre-wrap">${section.content}</p></div></div>
                                </div>
                            </div>
                        `;
                    }
                } else if (section.type === 'images' && section.images.length > 0) {
                    const gridHtml = section.images.map(img => `
                        <div>
                            <h4 class="text-sm font-semibold text-gray-700 mb-1 break-words">${img.heading || ''}</h4>
                            <img src="${img.src}" class="w-full rounded-lg shadow-sm border" crossorigin="anonymous">
                        </div>
                    `).join('');
                    secDiv.innerHTML = `${titleHtml}<div class="mt-4 grid grid-cols-2 gap-4">${gridHtml}</div>`;
                } else if (section.type === 'images') {
                     return; // Skip empty image galleries
                }
                
                outContainer.appendChild(secDiv);
            });

            switchView('document-view', false);
        }
        
        // --- MULTI-PAGE PDF GENERATOR ---
        async function getPdfBlob() {
            const { jsPDF } = window.jspdf;
            const content = document.getElementById('document-output');
            
            // Wait for images to load just in case
            await new Promise(resolve => setTimeout(resolve, 500));

            const canvas = await html2canvas(content, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            
            // Image mapping ratios
            const imgWidth = canvas.width;
            const imgHeight = canvas.height;
            const ratio = pdfWidth / imgWidth;
            const scaledTotalHeight = imgHeight * ratio;

            let heightLeft = scaledTotalHeight;
            let position = 0; // Vertical offset on the PDF page

            // First page
            pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, scaledTotalHeight);
            heightLeft -= pdfHeight;

            // Loop for additional pages, slicing the canvas image downwards
            while (heightLeft > 0) {
                position -= pdfHeight; // Shift the image up by exactly one PDF page height
                pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, scaledTotalHeight);
                heightLeft -= pdfHeight;
            }

            return pdf.output('blob');
        }

        function getFormattedFileName() {
            const today = new Date();
            const ds = `${today.getFullYear().toString().slice(-2)}${(today.getMonth() + 1).toString().padStart(2, '0')}${today.getDate().toString().padStart(2, '0')}`;
            const ref = document.getElementById('output-ref').textContent;
            const title = (document.getElementById('output-title').textContent || 'Untitled').replace(/[\s/]/g, '-');
            return `${ds}-${title}-${ref}.pdf`;
        }

        async function downloadPDF() {
            const btn = document.getElementById('pdf-download-button');
            const btnText = document.getElementById('pdf-download-text');
            const spinner = document.getElementById('pdf-download-spinner');

            btn.disabled = true;
            btnText.textContent = "Processing Pages...";
            spinner.classList.remove('hidden');

            try {
                const pdfBlob = await getPdfBlob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(pdfBlob);
                link.download = getFormattedFileName();
                link.click();
            } catch (error) { 
                alert("PDF Error: " + error.message); 
            } finally { 
                btn.disabled = false; 
                btnText.textContent = "Download Multi-Page PDF";
                spinner.classList.add('hidden');
            }
        }

        async function saveToFirebase() {
            const button = document.getElementById('firebase-save-button');
            const editingId = document.getElementById('editing-id').value;
            button.disabled = true;
            try {
                const userRefNumber = document.getElementById('output-ref').textContent;
                if (!editingId && userRefNumber === suggestedRefNumber) {
                    const counterRef = window.firebase.doc(window.firebase.db, "_config", "releaseCounter");
                    await window.firebase.runTransaction(window.firebase.db, async (transaction) => {
                        const counterDoc = await transaction.get(counterRef);
                        const newCounterValue = (counterDoc.exists() ? counterDoc.data().value : 0) + 1;
                        transaction.set(counterRef, { value: newCounterValue });
                    });
                }
                
                // Construct Data Object (Now saving the entire dynamic sections array)
                const releaseData = {
                    refNumber: userRefNumber,
                    title: document.getElementById('output-title').textContent,
                    productsAffected: document.getElementById('output-products').textContent,
                    category: document.getElementById('output-category').textContent,
                    releaseDate: document.getElementById('output-releaseDate').textContent,
                    effectiveDate: document.getElementById('output-effectiveDate').textContent,
                    sections: documentSections, // Dynamic Payload
                    createdAt: window.firebase.serverTimestamp()
                };

                const pdfBlob = await getPdfBlob();
                const fileName = getFormattedFileName();
                const storageRef = window.firebase.ref(window.firebase.storage, `releases/${fileName}`);
                await window.firebase.uploadBytes(storageRef, pdfBlob);
                releaseData.pdfUrl = await window.firebase.getDownloadURL(storageRef);
                releaseData.storagePath = storageRef.fullPath; 
                
                if (editingId) {
                    await window.firebase.updateDoc(window.firebase.doc(window.firebase.db, "releases", editingId), releaseData);
                } else {
                    await window.firebase.addDoc(window.firebase.collection(window.firebase.db, "releases"), releaseData);
                }
                alert('Saved!');
                await window.loadHistory(); 
                switchView('history-view'); 
            } catch (error) { alert("Save Error: " + error.message); } finally { button.disabled = false; }
        }
        
        window.loadHistory = async function() {
            const container = document.getElementById('history-results');
            try {
                const releasesRef = window.firebase.collection(window.firebase.db, "releases");
                const q = window.firebase.query(releasesRef, window.firebase.orderBy("createdAt", "desc"));
                const querySnapshot = await window.firebase.getDocs(q);
                allReleases = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                displayReleases(allReleases);
            } catch (error) { 
                console.error("History Error", error); 
                if (container) {
                    container.innerHTML = `<div class="bg-red-50 text-red-700 p-4 rounded-lg border border-red-200">
                        <p class="font-bold">Could not load history.</p>
                        <p class="text-sm mt-1 text-red-600">Error: ${error.message}</p>
                        <p class="text-sm mt-3 font-semibold">Please ensure your <strong>Firestore Database Rules</strong> are enabled and set to allow read/write access.</p>
                    </div>`;
                }
            }
        }

        function displayReleases(releases) {
            const container = document.getElementById('history-results');
            if (releases.length === 0) { container.innerHTML = '<p class="text-gray-500">No releases found.</p>'; return; }
            container.innerHTML = releases.map(release => `
                <div class="border border-gray-200 p-4 rounded-lg flex justify-between items-center hover:bg-gray-50">
                    <div>
                        <p class="font-bold text-lg text-gray-800">${release.title}</p>
                        <p class="text-sm text-gray-600">${release.refNumber} | Products: ${release.productsAffected}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <a href="${release.pdfUrl}" target="_blank" class="bg-green-100 text-green-800 font-semibold py-2 px-3 rounded-lg hover:bg-green-200 transition text-sm">View PDF</a>
                        <button onclick="editRelease('${release.id}')" class="bg-blue-100 text-blue-800 font-semibold py-2 px-3 rounded-lg hover:bg-blue-200 transition text-sm">Edit</button>
                        <button onclick="deleteRelease('${release.id}', '${release.storagePath}')" class="bg-red-100 text-red-800 font-semibold py-2 px-3 rounded-lg hover:bg-red-200 transition text-sm">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        window.editRelease = function(id) {
            const release = allReleases.find(r => r.id === id);
            if (!release) return;
            document.getElementById('editing-id').value = id;
            document.getElementById('ref-number-input').value = release.refNumber || '';
            document.getElementById('productsAffected').value = release.productsAffected || '';
            document.getElementById('category').value = release.category || 'Motors';
            document.getElementById('title').value = release.title || '';
            document.getElementById('effectiveDate').value = release.effectiveDate || '';
            
            // Legacy mapping for old static structure vs new dynamic array
            if (release.sections && Array.isArray(release.sections)) {
                // Deep copy so we don't accidentally mutate the history state
                documentSections = JSON.parse(JSON.stringify(release.sections));
            } else {
                // Legacy Map
                documentSections = [
                    { id: generateId(), type: 'text', title: 'Overview', content: release.overview || '' },
                    { id: generateId(), type: 'text', title: 'Details', content: release.details || '' },
                    { id: generateId(), type: 'images', title: 'Legacy Images', images: [] }, // Can't easily retrieve old base64 strings
                    { id: generateId(), type: 'text', title: 'Impact and Action Required', content: release.impact || '' }
                ];
            }

            renderSectionsForm();
            document.getElementById('form-title').textContent = 'Editing Technical Release';
            switchView('form-view', false);
        }

        window.deleteRelease = async function(id, storagePath) {
            if (!confirm('Permanently delete?')) return;
            try {
                await window.firebase.deleteDoc(window.firebase.doc(window.firebase.db, "releases", id));
                if (storagePath) await window.firebase.deleteObject(window.firebase.ref(window.firebase.storage, storagePath));
                alert('Deleted.');
                await loadHistory();
            } catch (error) { alert("Delete Error: " + error.message); }
        }

        window.searchReleases = function() {
            const term = document.getElementById('search-input').value.toLowerCase();
            if (!term) { displayReleases(allReleases); return; }
            const filtered = allReleases.filter(r => (r.title && r.title.toLowerCase().includes(term)) || (r.refNumber && r.refNumber.toLowerCase().includes(term)));
            displayReleases(filtered);
        }

        async function switchView(viewId, reset = true) {
            ['form-view', 'history-view', 'document-view'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            ['generator-tab-button', 'history-tab-button'].forEach(id => document.getElementById(id).classList.remove('active'));
            if (viewId === 'form-view' || viewId === 'document-view') document.getElementById('generator-tab-button').classList.add('active');
            else if (viewId === 'history-view') document.getElementById('history-tab-button').classList.add('active');
            if (viewId === 'form-view' && reset) await startNewRelease(false);
        }

        async function startNewRelease(switchToForm = true) {
            document.getElementById('editing-id').value = '';
            document.getElementById('form-title').textContent = 'Technical Release Generator';
            document.getElementById('productsAffected').value = '';
            document.getElementById('category').value = 'Motors';
            document.getElementById('title').value = '';
            document.getElementById('effectiveDate').value = '';
            initDefaultSections();
            await updateRefDisplay();
            if (switchToForm) switchView('form-view', false);
        }

        async function handleGeneratorTabClick() {
            if (!document.getElementById('editing-id').value) await startNewRelease(true);
            else switchView('form-view', false);
        }
    </script>
